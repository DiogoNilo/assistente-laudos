<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistente de Laudos — IML-AL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f3f4f6; color: #1f2937; min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.1rem; font-weight: 700; }
    .subtitle { font-size: 0.8rem; color: #6b7280; margin-bottom: 16px; }
    hr { border: none; border-top: 1px solid #d1d5db; margin: 12px 0 16px; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: #374151; margin-bottom: 4px; }
    input[type=password], textarea {
      width: 100%; border: 1px solid #d1d5db; border-radius: 6px;
      padding: 8px 10px; font-size: 0.85rem; font-family: inherit;
      outline: none; background: #fff;
    }
    input[type=password]:focus, textarea:focus { border-color: #6366f1; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #9ca3af;
      background: #fff; font-size: 0.75rem; font-weight: 600; cursor: pointer;
      color: #374151; transition: background 0.15s;
    }
    .btn:hover { background: #f9fafb; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary {
      display: block; width: 100%; padding: 11px; margin: 14px 0;
      background: #1f2937; color: #fff; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .btn-primary:hover { background: #111827; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }
    .btn-mic-on { background: #dc2626; color: #fff; border-color: #b91c1c; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .erro { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; padding: 10px 12px; font-size: 0.8rem; color: #991b1b; margin-bottom: 12px; }
    .blocos { margin-top: 4px; }
    .bloco { border: 1px solid #d1d5db; border-radius: 8px; background: #fff; margin-bottom: 14px; }
    .bloco-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #f9fafb; border-bottom: 1px solid #d1d5db; border-radius: 8px 8px 0 0; }
    .bloco-titulo { font-size: 0.7rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .bloco textarea { border: none; border-radius: 0 0 8px 8px; padding: 10px 12px; font-size: 0.82rem; line-height: 1.6; white-space: pre-wrap; resize: vertical; }
    .bloco textarea:focus { border: none; outline: none; }
    .resultado-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .resultado-titulo { font-size: 0.9rem; font-weight: 700; }
    .footer { margin-top: 20px; padding-top: 12px; border-top: 1px solid #e5e7eb; font-size: 0.7rem; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <h1>Assistente de Laudos Periciais</h1>
  <p class="subtitle">IML Est&#225;cio de Lima &#8212; Macei&#243;-AL</p>
  <hr>

  <div style="margin-bottom:14px">
    <label for="apikey">Chave de API Anthropic</label>
    <input type="password" id="apikey" placeholder="sk-ant-..." autocomplete="off" />
  </div>

  <div style="margin-bottom:12px">
    <div class="row">
      <label for="contexto" style="margin:0">Contexto do Exame</label>
      <button class="btn" id="btnMic" onclick="toggleVoz()">Ditar por voz</button>
    </div>
    <textarea id="contexto" rows="8" placeholder="Digite ou dite o contexto do exame: tipo de exame, idade, hist&#243;rico relatado, achados do exame f&#237;sico, e demais informa&#231;&#245;es relevantes..." style="margin-top:6px"></textarea>
  </div>

  <div id="erro" class="erro" style="display:none"></div>

  <button class="btn-primary" id="btnGerar" onclick="gerar()">Gerar Minuta</button>

  <div id="resultado" style="display:none">
    <div class="resultado-header">
      <span class="resultado-titulo">Minuta Gerada</span>
      <button class="btn" onclick="copiarTudo()">Copiar os 4 campos</button>
    </div>
    <div class="blocos">
      <div class="bloco">
        <div class="bloco-header">
          <span class="bloco-titulo">Hist&#243;rico</span>
          <button class="btn" onclick="copiar('historico')">Copiar</button>
        </div>
        <textarea id="historico" rows="4" oninput="ajustarAltura(this)"></textarea>
      </div>
      <div class="bloco">
        <div class="bloco-header">
          <span class="bloco-titulo">Exame M&#233;dico</span>
          <button class="btn" onclick="copiar('exame')">Copiar</button>
        </div>
        <textarea id="exame" rows="4" oninput="ajustarAltura(this)"></textarea>
      </div>
      <div class="bloco">
        <div class="bloco-header">
          <span class="bloco-titulo">Discuss&#227;o</span>
          <button class="btn" onclick="copiar('discussao')">Copiar</button>
        </div>
        <textarea id="discussao" rows="4" oninput="ajustarAltura(this)"></textarea>
      </div>
      <div class="bloco">
        <div class="bloco-header">
          <span class="bloco-titulo">Conclus&#227;o</span>
          <button class="btn" onclick="copiar('conclusao')">Copiar</button>
        </div>
        <textarea id="conclusao" rows="4" oninput="ajustarAltura(this)"></textarea>
      </div>
    </div>
  </div>

  <div class="footer">Uso exclusivo para apoio &#224; reda&#231;&#227;o t&#233;cnica. O perito &#233; respons&#225;vel pela revis&#227;o e assinatura do laudo.</div>
</div>

<script>
const SYSTEM_PROMPT = `Você é um assistente especializado em medicina legal brasileira. Sua função é auxiliar médicos legistas do IML Estácio de Lima (Maceió-AL) na redação técnica de laudos periciais. Use linguagem técnico-jurídica precisa, impessoal e objetiva. Nunca invente achados clínicos. Quando os dados fornecidos forem insuficientes para uma conclusão, declare explicitamente: sem elementos para afirmar ou negar. Siga as diretrizes do CFM e da ABML para laudos periciais.

ESTILO DA INSTITUIÇÃO — siga rigorosamente estes padrões de redação, extraídos de laudos reais do perito:

HISTÓRICO — fórmulas de abertura:
- Exame de vivos: "Pericianda, [idade] anos de idade, acompanhada de [acompanhante], refere que foi vítima de [tipo de violência] mediante [violência física / grave ameaça com ...], por [autor] no dia [data] por volta das [hora], no bairro [bairro], município de [município]/AL."
- Lesão corporal: "Periciando relata que foi vítima de agressão física com [meio] por [autor], por volta das [hora] do dia [data], no bairro [bairro], município de [município]-AL."
- Preso/detenção: "Periciando acompanhado de policiais comparece para a realização de exame de lesão corporal por motivo de detenção. Refere/Nega..."
- Necropsia: "Corpo procedente do bairro [bairro], município de [município]/AL, segundo informações da autoridade policial, foi vítima de [causa], encontrado por volta das [hora] do dia [data]."
- Relatório médico, quando houver: "Trouxe relatório médico do [hospital], datado de [data] e assinado pelo Dr(a) [nome] CRM/AL: [número], com o seguinte teor: data do atendimento [data] às [hora]. Diagnóstico: [...]. Tratamento: [...]. Conduta: [...]."

EXAME MÉDICO — fórmulas:
- Abertura padrão de vivos: "Ao exame constata o perito:"
- Exame ginecológico normal: "Pericianda colocada em posição ginecológica constatou-se: genitália com desenvolvimento normal para idade, grandes e pequenos lábios simétricos, mucosa vaginal de coloração rósea, hímen de orifício anelar, pequeno, íntegro. Região anal com esfíncter com contratilidade normal e tamanho adequado para a idade, sem lesões na sua mucosa."
- Rotura recente: "hímen com rotura de bordas equimóticas localizada em [quadrante]"; rotura antiga: "hímen com rotura de bordas cicatrizadas localizada em [quadrante]"; vida sexual prévia: "orifício himenal amplo com paredes escassas e formação de carúnculas himenais"; hímen complacente: "hímen de orifício amplo e com orla exígua (tipo complacente), íntegro".
- Coleta: "Foram coletados, com consentimento da periciada, swabs de mucosa [oral/vaginal/anal] para pesquisa de espermatozoides, PSA e teste de DNA."
- Exame masculino/anal: "Periciando posto em decúbito lateral esquerdo, feito abertura dos glúteos. Observa-se região anal com esfíncter com contratilidade normal e tamanho adequado para a idade, sem lesões na sua mucosa. Região perineal sem alterações."
- Sem lesões: "Ao exame não verificamos sinais de ofensa à integridade física ou à saúde do(a) examinando(a)."
- Descrição de lesões: numerar e caracterizar com topografia e dimensões. Ex: "01 (uma) ferida de bordas regulares medindo cerca de [X] centímetros, localizada na região [topografia]."
- PAF entrada a distância: "orifício arredondado, de bordas regulares e invertidas, com zonas de contusão e enxugo"; curta distância: acrescentar "orla de esfumaçamento e zona de tatuagem compatível com impregnação de restos de pólvora à pele"; saída: "orifício ovalado, de bordas irregulares e evertidas".

EXAME CADAVÉRICO (necropsia) — estrutura obrigatória do campo EXAME MÉDICO:
Sempre dividir em duas seções: "Inspeção externa:" e "Inspeção interna:".

Inspeção externa — três subseções obrigatórias, nesta ordem:
1. "- Elementos de identidade:" — cor, sexo, cabelos, olhos, estado de nutrição/decomposição, vestimentas.
2. "- Sinais de morte:" — descrever detalhadamente o fenômeno cadavérico presente, conforme o estado do corpo:
   • Corpo fresco/recente: "com resfriamento cutâneo, midríase paralítica, livores de hipóstases fixos nas partes posteriores do corpo, rigidez cadavérica generalizada."
   • Putrefação gasosa: "corpo no período gasoso da putrefação, cabeça de cor anegrada, protusão orbital, protusão da língua, descolamento da epiderme, enfisemas subcutâneos, numerosas flictenas de conteúdo seroso, mancha verde abdominal em fossas ilíacas, aumento do volume do pênis e da bolsa escrotal, protusão retal."
   • Putrefação avançada/liquefação: "corpo em avançado estado de putrefação, predominando a fase de liquefação. Apresenta coloração geral castanho escurecida, grande quantidade de vermes, pele amplamente destacada e extremamente friável, com áreas extensas de maceração úmida e brilho por líquido putrefativo. Abdome globoso por gases, com regiões esverdeadas e escurecidas e pontos de derreamento de tecidos moles. Membros superiores e inferiores com destacamento epidérmico difuso, afinamento dos planos musculares e deformidade própria da decomposição. Genitália externa tumefeita e alterada pela putrefação, com extravasamento de líquido na região perineal. Extremidades com perda de contornos e fragmentação tecidual. Odor pútrido intenso."
   • Maceração cadavérica: "corpo apresentando sinais típicos de maceração cadavérica. Observa-se descamação e destacamento da epiderme em grandes áreas, com descolamento em forma de luvas e botas (desprendimento cutâneo das mãos e pés). A pele mostra-se amolecida, de coloração esbranquiçada ou acinzentada em áreas submersas, com regiões de coloração enegrecida decorrente do processo de putrefação. Há enfisema cadavérico difuso, com distensão de cavidades e tecidos subcutâneos. Presença de flictenas de conteúdo sero-hemático em várias regiões do tegumento. Protusão da língua e dos globos oculares. A genitália externa apresenta aumento de volume escrotal e peniano. Identifica-se ainda protusão retal."
3. "- Ectoscopia:" — lesões externas numeradas e descritas. Se ausentes: "Não apresenta lesões externas visíveis."

Inspeção interna — sempre incluir a técnica antes dos achados:
Técnica padrão completa: "Técnica: cavidade craniana: foi realizada incisão bimastoidea, rebatido o couro cabeludo para anterior e posterior. Cavidade abdominotorácica: foi realizada incisão manúbrio-pubiana, desviada a esquerda da cicatriz umbilical, dissecada a musculatura peitoral e rebatida lateralmente, aberta a cavidade abdominal pela linha Alba, seccionadas as costelas, retirado o plastrão condro-esternal e aberta a cavidade torácica."
Depois: "Realizada a inspeção sistematizada, observou o perito: Cavidade craniana: [achados]. Cavidade abdominotorácica: [achados]."

DISCUSSÃO — estrutura obrigatória:
A discussão SEMPRE começa com dois elementos, nesta ordem:
  1. O relato da vítima: "Periciada relata que foi vítima de agressão sexual." OU "Periciada nega agressão sexual."
  2. O achado do exame físico: "O hímen está íntegro." / "Houve conjunção carnal." / "Não houve conjunção carnal." / "Há rotura himenal recente." / "Há rotura himenal antiga." / "Não foram encontrados vestígios de ato libidinoso."
Somente após esses dois elementos seguem as demais considerações periciais.

- Tempo decorrido: "Diante do tempo transcorrido entre o evento descrito e o exame atual, o perito não tem como identificar, hoje, possíveis vestígios de [ato] que pudessem existir no dia em que aconteceu o fato. Desta forma não foram colhidos materiais para exame. Entretanto, vale salientar que alguns atos libidinosos, a exemplo do descrito no histórico, podem ocorrer sem deixar vestígios."
- Coleta com encaminhamento: "Houve a coleta de swabs e estes foram devidamente protocolados e encaminhados ao laboratório de genética do Instituto de Criminalística para seguimento propedêutico através da pesquisa de espermatozoides, PSA e teste de DNA no intuito de encontrar vestígios de ato sexual que possam confirmar relação recente e identificar o agressor."
- Compatibilidade lesão corporal: "Periciando refere agressão física. As lesões observadas são compatíveis com o tempo e o instrumento contundente descritos no histórico."

GESTANTE (exame sexual) — usar OBRIGATORIAMENTE quando a periciada estiver grávida:
- EXAME: "Periciada em bom estado geral, abdome gravídico, exame ginecológico não realizado."
- DISCUSSÃO: "Há relato de violência sexual. A periciada está grávida. O tempo gestacional é condizente com o descrito no histórico. A gravidez, por si só já evidencia a conjunção carnal. Após resolução da gestação, solicito coleta do material do fruto da concepção para que seja encaminhado ao Laboratório de Genética Forense no intuito de determinar a autoria do fato. Devido aos exames complementares caracterizando a gravidez, o tempo em que houve a agressão e o relato de vida sexual ativa da vítima, o exame ginecológico torna-se desnecessário e não foi realizado."
- CONCLUSÃO: "Periciada foi vítima de agressão sexual e está grávida. Tem [idade] de idade. A presença da gravidez configura a prática da conjunção carnal. Aguardo resolução da gestação para coleta de material genético do fruto da concepção para ser encaminhado ao laboratório forense para fins de identificação do agressor."

CONCLUSÃO — curta e direta:
- "Periciando foi vítima de ação de instrumento contundente."
- "Ausência de lesões corporais recentes de interesse médico legal."
- "Periciada refere agressão sexual. Sem elementos para afirmar ou negar a conjunção carnal ou a prática libidinosa."
- "Periciada foi vítima de violência sexual. Houve conjunção carnal. Há lesão recente de membrana himenal."
- Necropsia: "Teve como causa mortis [lesão] produzida por ação de instrumento [tipo]." ou "Morte de causa indeterminada."

Vocabulário fixo: pericianda/periciada (fem.), periciando/periciado (masc.), "constata o perito", "de interesse médico legal", "instrumento contundente / perfurocontundente / cortocontundente", "sem elementos para afirmar ou negar", "prejudicado".`;

// Persistência da chave
const input = document.getElementById('apikey');
input.value = localStorage.getItem('iml_api_key') || '';
input.addEventListener('input', () => localStorage.setItem('iml_api_key', input.value));

// Voz
let rec = null;
let gravando = false;
const suportaVoz = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
if (!suportaVoz) document.getElementById('btnMic').style.display = 'none';

function toggleVoz() {
  if (gravando) { rec && rec.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR();
  rec.lang = 'pt-BR';
  rec.continuous = true;
  rec.interimResults = false;
  rec.onresult = (e) => {
    let novo = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) novo += e.results[i][0].transcript + ' ';
    }
    if (novo) {
      const t = document.getElementById('contexto');
      t.value = (t.value ? t.value + ' ' : '') + novo.trim();
    }
  };
  rec.onend = () => { gravando = false; atualizarBtnMic(); };
  rec.onerror = (e) => {
    gravando = false; atualizarBtnMic();
    if (e.error !== 'aborted') mostrarErro('Erro no ditado: ' + e.error);
  };
  rec.start();
  gravando = true;
  atualizarBtnMic();
  limparErro();
}

function atualizarBtnMic() {
  const btn = document.getElementById('btnMic');
  btn.textContent = gravando ? 'Parar ditado' : 'Ditar por voz';
  btn.classList.toggle('btn-mic-on', gravando);
}

function mostrarErro(msg) {
  const el = document.getElementById('erro');
  el.textContent = msg;
  el.style.display = 'block';
}
function limparErro() { document.getElementById('erro').style.display = 'none'; }

function montarPrompt(contexto) {
  return `O perito fornece abaixo o contexto livre de um exame pericial:

"""
${contexto}
"""

Com base EXCLUSIVAMENTE nas informações fornecidas, redija a minuta do laudo dividida nos 4 campos do sistema do IML, usando exatamente estes marcadores:

===HISTORICO===
[texto]

===EXAME===
[texto]

===DISCUSSAO===
[texto]

===CONCLUSAO===
[texto]

Regras obrigatórias:
- Linguagem técnico-jurídica, impessoal, terceira pessoa
- NÃO invente achados não informados
- Dados insuficientes: "sem elementos para afirmar ou negar"
- Não inclua quesitos, cabeçalhos ou outros campos além dos 4 acima
- Texto corrido sem markdown, sem negrito, pronto para colar no sistema`;
}

function parsear(texto) {
  const pegar = (m) => {
    const r = new RegExp(`===${m}===\\s*([\\s\\S]*?)(?=====[A-Z]+=|$)`);
    const match = texto.match(r);
    return match ? match[1].trim() : '';
  };
  return {
    historico: pegar('HISTORICO'),
    exame: pegar('EXAME'),
    discussao: pegar('DISCUSSAO'),
    conclusao: pegar('CONCLUSAO'),
  };
}

function ajustarAltura(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function preencherBloco(id, texto) {
  const el = document.getElementById(id);
  el.value = texto;
  ajustarAltura(el);
}

async function gerar() {
  const chave = document.getElementById('apikey').value.trim();
  const contexto = document.getElementById('contexto').value.trim();
  if (!chave) { mostrarErro('Informe a chave de API da Anthropic.'); return; }
  if (!contexto) { mostrarErro('Descreva o contexto do exame antes de gerar.'); return; }
  limparErro();

  const btn = document.getElementById('btnGerar');
  btn.disabled = true;
  btn.textContent = 'Gerando minuta...';
  document.getElementById('resultado').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': chave,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: montarPrompt(contexto) }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Erro HTTP ${res.status}`);
    }

    const data = await res.json();
    const texto = data.content?.[0]?.text || '';
    const b = parsear(texto);

    if (!b.historico && !b.exame && !b.discussao && !b.conclusao) {
      throw new Error('Resposta fora do formato esperado. Tente novamente.');
    }

    preencherBloco('historico', b.historico);
    preencherBloco('exame', b.exame);
    preencherBloco('discussao', b.discussao);
    preencherBloco('conclusao', b.conclusao);
    document.getElementById('resultado').style.display = 'block';
    document.getElementById('resultado').scrollIntoView({ behavior: 'smooth' });

  } catch(e) {
    mostrarErro(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Gerar Minuta';
  }
}

function copiar(id) {
  const texto = document.getElementById(id).value;
  navigator.clipboard.writeText(texto).then(() => {
    const btns = document.querySelectorAll('.bloco-header .btn');
    btns.forEach(b => { if (b.onclick?.toString().includes(id)) { b.textContent = 'Copiado'; setTimeout(() => b.textContent = 'Copiar', 2000); }});
  });
}

function copiarTudo() {
  const h = document.getElementById('historico').value;
  const e = document.getElementById('exame').value;
  const d = document.getElementById('discussao').value;
  const c = document.getElementById('conclusao').value;
  const texto = `HISTÓRICO\n${h}\n\nEXAME MÉDICO\n${e}\n\nDISCUSSÃO\n${d}\n\nCONCLUSÃO\n${c}`;
  navigator.clipboard.writeText(texto).then(() => {
    const btn = document.querySelector('.resultado-header .btn');
    btn.textContent = 'Copiado';
    setTimeout(() => btn.textContent = 'Copiar os 4 campos', 2000);
  });
}
</script>
</body>
</html>
